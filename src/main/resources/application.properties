spring.application.name=management

# Datasource (Postgres) - reads from environment variables if available. Defaults match docker-compose.yml service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/schooldb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT - set via env var SECURITY_JWT_SECRET
security.jwt.secret=${SECURITY_JWT_SECRET:change-me-to-a-strong-secret}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:86400000}

# Mail (configure SMTP for notifications)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:false}

# Application
app.default-from-email=${APP_DEFAULT_FROM_EMAIL:no-reply@school.local}
